name: Node Base Image

on:
  pull_request:
    paths:
      - ".github/workflows/node-base-image.yml"
      - "apps/admin/**"
      - "apps/cli/**"
      - "apps/gateway/**"
      - "devcontainer-base/**"
      - "docs/anvil-node-base-spec.md"
      - "infra/docker/**"
      - "package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/smoke-node-base-image"
      - "scripts/smoke-node-base-image-observed"
      - "scripts/smoke-node-base-image-report"
      - "turbo.json"
      - "tsconfig.base.json"
  push:
    branches:
      - main
    tags:
      - "node-base-v*"
    paths:
      - ".github/workflows/node-base-image.yml"
      - "apps/admin/**"
      - "apps/cli/**"
      - "apps/gateway/**"
      - "devcontainer-base/**"
      - "docs/anvil-node-base-spec.md"
      - "infra/docker/**"
      - "package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/smoke-node-base-image"
      - "scripts/smoke-node-base-image-observed"
      - "scripts/smoke-node-base-image-report"
      - "turbo.json"
      - "tsconfig.base.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: node-base-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/anvil-node-base
  SMOKE_IMAGE: anvil-node-base-smoke:ci

jobs:
  build:
    name: Build and validate image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Show tool versions
        run: |
          node --version
          pnpm --version
          docker version
          docker buildx version

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Test Node Base scripts
        run: pnpm test:node-base

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: devcontainer-base
          file: devcontainer-base/Dockerfile
          load: true
          tags: ${{ env.SMOKE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image defaults
        run: ANVIL_NODE_BASE_SMOKE_IMAGE="${SMOKE_IMAGE}" ./scripts/smoke-node-base-image

      - name: Verify observed install mode
        run: ANVIL_NODE_BASE_SMOKE_IMAGE="${SMOKE_IMAGE}" ./scripts/smoke-node-base-image-observed

      - name: Verify registry report submission
        run: ANVIL_NODE_BASE_SMOKE_IMAGE="${SMOKE_IMAGE}" ./scripts/smoke-node-base-image-report

      - name: Capture Docker logs
        if: failure()
        run: |
          mkdir -p .ci-artifacts
          docker images > .ci-artifacts/docker-images.txt || true
          docker ps -a > .ci-artifacts/docker-containers.txt || true
          docker compose -f infra/docker/docker-compose.yml logs --no-color > .ci-artifacts/docker-compose.log || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-base-image-logs
          path: .ci-artifacts
          if-no-files-found: ignore

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/node-base-v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/node-base-v'))
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=22,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=22-bookworm,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=tag,prefix=

      - name: Publish image
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/node-base-v'))
        uses: docker/build-push-action@v6
        with:
          context: devcontainer-base
          file: devcontainer-base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
