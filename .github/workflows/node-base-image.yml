name: Node Base Image

on:
  pull_request:
    paths:
      - ".github/workflows/node-base-image.yml"
      - "devcontainer-base/**"
      - "scripts/smoke-node-base-image"
      - "scripts/smoke-node-base-image-observed"
  push:
    branches:
      - main
    tags:
      - "node-base-v*"
    paths:
      - ".github/workflows/node-base-image.yml"
      - "devcontainer-base/**"
      - "scripts/smoke-node-base-image"
      - "scripts/smoke-node-base-image-observed"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/anvil-node-base
  SMOKE_IMAGE: anvil-node-base-smoke:ci

jobs:
  build:
    name: Build and validate image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke image
        uses: docker/build-push-action@v6
        with:
          context: devcontainer-base
          file: devcontainer-base/Dockerfile
          load: true
          tags: ${{ env.SMOKE_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image defaults
        run: ANVIL_NODE_BASE_SMOKE_IMAGE="${SMOKE_IMAGE}" ./scripts/smoke-node-base-image

      - name: Verify observed install mode
        run: ANVIL_NODE_BASE_SMOKE_IMAGE="${SMOKE_IMAGE}" ./scripts/smoke-node-base-image-observed

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/node-base-v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/node-base-v'))
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=22,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=22-bookworm,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=tag,prefix=

      - name: Publish image
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/node-base-v'))
        uses: docker/build-push-action@v6
        with:
          context: devcontainer-base
          file: devcontainer-base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
